<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movies — StreamVault</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .page-hero {
      height:280px; position:relative;
      display:flex; align-items:flex-end; padding:0 5% 2.5rem;
      overflow:hidden; margin-top:var(--nav-h);
      background:linear-gradient(135deg,#0e1525,#1a0a0a);
    }
    .page-hero::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at 30% 50%,rgba(229,9,20,.18) 0%,transparent 60%),
                  radial-gradient(ellipse at 80% 20%,rgba(255,107,53,.08) 0%,transparent 50%);
    }
    .page-hero-content { position:relative; z-index:1; }
    .page-title { font-family:var(--font-d); font-size:clamp(2.5rem,5vw,4rem); letter-spacing:2px; margin-bottom:.4rem; }
    .page-title span { color:var(--red); }
    .page-sub { color:var(--muted); font-size:.95rem; }

    /* FILTERS BAR */
    .filters-bar {
      position:sticky; top:var(--nav-h); z-index:50;
      background:rgba(8,12,20,.96); backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      padding:.9rem 5%;
      display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
    }
    .filter-group { display:flex; align-items:center; gap:.5rem; }
    .filter-group label { font-size:.78rem; color:var(--muted); font-weight:600; letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }
    .filter-select {
      background:var(--surface); border:1px solid var(--border);
      color:var(--text); border-radius:6px; padding:6px 12px;
      font-family:var(--font-b); font-size:.83rem; cursor:pointer; outline:none;
      transition:border-color .2s;
    }
    .filter-select:focus { border-color:var(--red); }
    .filter-search {
      flex:1; min-width:200px;
      display:flex; align-items:center; gap:8px;
      background:rgba(255,255,255,.06); border:1px solid var(--border);
      border-radius:6px; padding:6px 14px;
    }
    .filter-search input {
      background:none; border:none; outline:none;
      color:var(--text); font-family:var(--font-b); font-size:.85rem; width:100%;
    }
    .filter-search input::placeholder { color:var(--muted); }
    .result-count { margin-left:auto; font-size:.82rem; color:var(--muted); white-space:nowrap; }

    /* MOVIES PAGE GRID */
    .movies-container { padding:2rem 5%; }
    .cat-section { margin-bottom:3rem; }
    .full-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(165px,1fr)); gap:1rem; }

    .no-results {
      text-align:center; padding:4rem 1rem; color:var(--muted);
    }
    .no-results .icon { font-size:3rem; margin-bottom:1rem; }
    .no-results h3 { font-family:var(--font-d); font-size:1.5rem; margin-bottom:.5rem; color:var(--text); }

    @media(max-width:600px){ .filters-bar{flex-direction:column;align-items:stretch;} .filter-search{min-width:unset;} }
  
</style>
</head>
<body>

<nav id="mainNav"></nav>
<div class="mob-menu" id="mobMenu">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="movies.html">Movies</a></li>
    <li><a href="tvshows.html">TV Shows</a></li>
    <li><a href="movies.html?cat=new">New &amp; Popular</a></li>
    <li><a href="profile.html?tab=list">My List</a></li>
  </ul>
</div>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="page-hero-content">
    <h1 class="page-title" id="pageTitle">All <span>Movies</span></h1>
    <p class="page-sub" id="pageSub">Browse our entire collection of blockbusters</p>
  </div>
</div>

<!-- FILTERS -->
<div class="filters-bar">
  <div class="filter-search">
    <span style="color:var(--muted)">🔍</span>
    <input type="text" id="searchBox" placeholder="Search title, actor, genre…" oninput="applyFilters()"/>
  </div>
  <div class="filter-group">
    <label>Language</label>
    <select class="filter-select" id="langFilter" onchange="applyFilters()">
      <option value="">All</option>
      <option>Telugu</option>
      <option>Hindi</option>
      <option>Tamil</option>
      <option>Kannada</option>
      <option>English</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Genre</label>
    <select class="filter-select" id="genreFilter" onchange="applyFilters()">
      <option value="">All</option>
      <option>Action</option>
      <option>Drama</option>
      <option>Comedy</option>
      <option>Romance</option>
      <option>Thriller</option>
      <option>Sci-Fi</option>
      <option>Fantasy</option>
      <option>Mystery</option>
      <option>Animation</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Sort</label>
    <select class="filter-select" id="sortFilter" onchange="applyFilters()">
      <option value="default">Default</option>
      <option value="rating">Top Rated</option>
      <option value="year">Newest</option>
      <option value="az">A → Z</option>
    </select>
  </div>
  <span class="result-count" id="resultCount">— results</span>
</div>

<!-- CONTENT -->
<div class="movies-container" id="moviesContainer"></div>

<footer id="mainFooter"></footer>

<script src="shared.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const catParam  = params.get('cat')  || 'all';
const langParam = params.get('lang') || '';
const qParam    = params.get('q')    || '';

function applyFilters() {
  const q     = document.getElementById('searchBox').value.toLowerCase();
  const lang  = document.getElementById('langFilter').value;
  const genre = document.getElementById('genreFilter').value;
  const sort  = document.getElementById('sortFilter').value;

  let pool = MOVIES_DB.all;

  // category filter
  if (catParam === 'hollywood') pool = MOVIES_DB.hollywood;
  else if (catParam === 'viewed')pool = MOVIES_DB.mostViewed;
  else if (catParam === 'new')   pool = [...MOVIES_DB.paradise, ...MOVIES_DB.hollywood.filter(m=>parseInt(m.year)>=2024), ...MOVIES_DB.trending.filter(m=>parseInt(m.year)>=2023)];

  // search
  if (q)     pool = pool.filter(m => m.title.toLowerCase().includes(q) || m.genre.toLowerCase().includes(q) || m.lang.toLowerCase().includes(q));
  if (lang)  pool = pool.filter(m => m.lang === lang);
  if (genre) pool = pool.filter(m => m.genre === genre);

  // sort
  if (sort === 'rating') pool = [...pool].sort((a,b) => parseFloat(b.rating)-parseFloat(a.rating));
  else if (sort === 'year') pool = [...pool].sort((a,b) => parseInt(b.year)-parseInt(a.year));
  else if (sort === 'az')   pool = [...pool].sort((a,b) => a.title.localeCompare(b.title));

  document.getElementById('resultCount').textContent = pool.length + ' results';

  const container = document.getElementById('moviesContainer');
  if (pool.length === 0) {
    container.innerHTML = `<div class="no-results"><div class="icon">🎬</div><h3>No movies found</h3><p>Try adjusting your filters or search term.</p></div>`;
    return;
  }
  container.innerHTML = `<div class="full-grid">${pool.map(makeCard).join('')}</div>`;
}

window.addEventListener('DOMContentLoaded', () => {
  buildNav('movies');
  buildFooter();
  initNavScroll();

  // set page title based on category
  const titles = {
    all:      ['All Movies',      'Browse our entire collection of blockbusters'],
    hollywood:['Hollywood Movies','International hits and blockbusters'],
    viewed:   ['Most Viewed',     'The most-watched titles on StreamVault'],
    new:      ['New & Popular',   'Fresh releases and trending titles'],
    series:   ['TV Series',       'Binge-worthy shows from around the world'],
  };
  const [title, sub] = titles[catParam] || titles.all;
  document.getElementById('pageTitle').innerHTML = title.replace(/ (\S+)$/, ' <span>$1</span>');
  document.getElementById('pageSub').textContent = sub;

  // apply URL params
  if (langParam) document.getElementById('langFilter').value = langParam;
  if (qParam)    document.getElementById('searchBox').value  = qParam;

  applyFilters();
});
</script>
</body>
</html>
