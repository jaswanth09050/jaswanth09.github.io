<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie — StreamVault</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    /* MOVIE BACKDROP */
    .movie-backdrop {
      position:relative; height:70vh; min-height:480px; overflow:hidden;
      margin-top:var(--nav-h);
      display:flex; align-items:flex-end;
    }
    .backdrop-img {
      position:absolute; inset:0;
      background-size:cover; background-position:center top;
      filter:brightness(.55);
    }
    .backdrop-grad {
      position:absolute; inset:0;
      background:linear-gradient(to top, var(--bg) 0%, rgba(8,12,20,.6) 40%, transparent 100%),
                 linear-gradient(to right, rgba(8,12,20,.8) 0%, transparent 60%);
    }
    .movie-info-hero {
      position:relative; z-index:1;
      display:flex; gap:2.5rem; align-items:flex-end;
      padding:0 5% 3rem; width:100%;
    }
    .movie-poster {
      width:180px; flex-shrink:0; border-radius:12px; overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,.8); border:2px solid var(--border);
    }
    .movie-poster img { width:100%; display:block; }
    .movie-details { flex:1; }
    .movie-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(229,9,20,.15); border:1px solid rgba(229,9,20,.3); color:var(--red); border-radius:4px; padding:3px 10px; font-size:.72rem; font-weight:700; letter-spacing:1px; margin-bottom:.8rem; }
    .movie-main-title { font-family:var(--font-d); font-size:clamp(2.5rem,5vw,4.5rem); letter-spacing:2px; line-height:1; margin-bottom:.7rem; }
    .movie-meta { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; font-size:.88rem; color:var(--muted); margin-bottom:1rem; }
    .movie-meta .star { color:var(--gold); font-size:1rem; }
    .movie-meta .rating { color:var(--gold); font-weight:700; }
    .meta-tag { background:rgba(255,255,255,.08); border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-size:.75rem; }
    .movie-desc { color:rgba(232,234,240,.8); font-size:.97rem; line-height:1.75; max-width:600px; margin-bottom:1.5rem; }
    .movie-actions { display:flex; gap:1rem; flex-wrap:wrap; }

    /* TABS */
    .tabs-section { padding:2rem 5% 0; }
    .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:2rem; }
    .tab { padding:.9rem 1.5rem; font-size:.88rem; font-weight:600; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; transition:all .2s; }
    .tab.active { color:#fff; border-bottom-color:var(--red); }
    .tab:hover { color:var(--text); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* CAST */
    .cast-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:1.2rem; }
    .cast-card { text-align:center; }
    .cast-avatar { width:70px; height:70px; border-radius:50%; background:var(--grad); display:flex; align-items:center; justify-content:center; font-family:var(--font-d); font-size:1.5rem; margin:0 auto .6rem; border:2px solid var(--border); }
    .cast-name { font-size:.8rem; font-weight:600; }
    .cast-role { font-size:.72rem; color:var(--muted); }

    /* RATINGS */
    .rating-block { display:flex; gap:2rem; flex-wrap:wrap; margin-bottom:2rem; }
    .rating-source { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.2rem 1.5rem; text-align:center; }
    .rating-source .score { font-family:var(--font-d); font-size:2rem; color:var(--gold); }
    .rating-source .label { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

    /* RELATED */
    .related-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:.9rem; }

    /* DETAILS TABLE */
    .details-table { width:100%; border-collapse:collapse; }
    .details-table tr { border-bottom:1px solid var(--border); }
    .details-table td { padding:.75rem 1rem; font-size:.88rem; }
    .details-table td:first-child { color:var(--muted); width:160px; font-weight:600; }

    @media(max-width:700px){
      .movie-poster{display:none;}
      .movie-info-hero{padding:0 5% 2rem;}
      .movie-backdrop{height:50vh;}
    }
  
</style>
</head>
<body>

<nav id="mainNav"></nav>
<div class="mob-menu" id="mobMenu">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="movies.html">Movies</a></li>
    <li><a href="#">TV Shows</a></li>
    <li><a href="movies.html?cat=new">New &amp; Popular</a></li>
    <li><a href="profile.html?tab=list">My List</a></li>
  </ul>
</div>

<!-- BACKDROP -->
<div class="movie-backdrop">
  <div class="backdrop-img" id="backdropImg"></div>
  <div class="backdrop-grad"></div>
  <div class="movie-info-hero">
    <div class="movie-poster"><img id="posterImg" src="" alt="poster"/></div>
    <div class="movie-details">
      <div class="movie-badge" id="movieBadge">4K UHD</div>
      <h1 class="movie-main-title" id="movieTitle">Loading…</h1>
      <div class="movie-meta" id="movieMeta"></div>
      <p class="movie-desc" id="movieDesc"></p>
      <div class="movie-actions">
        <button class="btn-h btn-play" id="btnPlay">▶ Play Now</button>
        <button class="btn-h btn-info" id="btnList">+ My List</button>
        <button class="btn-h btn-info" id="btnDownload">↓ Download</button>
        <a class="btn-h btn-info" href="movies.html">← Back</a>
      </div>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-section">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('about')">About</div>
    <div class="tab" onclick="switchTab('cast')">Cast & Crew</div>
    <div class="tab" onclick="switchTab('ratings')">Ratings</div>
    <div class="tab" onclick="switchTab('related')">More Like This</div>
  </div>

  <!-- ABOUT -->
  <div class="tab-panel active" id="tab-about">
    <table class="details-table" id="detailsTable"></table>
  </div>

  <!-- CAST -->
  <div class="tab-panel" id="tab-cast">
    <div class="cast-grid" id="castGrid"></div>
  </div>

  <!-- RATINGS -->
  <div class="tab-panel" id="tab-ratings">
    <div class="rating-block" id="ratingBlock"></div>
    <p style="color:var(--muted);font-size:.85rem;">Ratings collected from IMDb, Rotten Tomatoes, and StreamVault users.</p>
  </div>

  <!-- RELATED -->
  <div class="tab-panel" id="tab-related">
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</div>

<br/><br/>
<footer id="mainFooter"></footer>

<script src="shared.js"></script>
<script>
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', ['about','cast','ratings','related'][i]===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active', p.id==='tab-'+name));
}

const CAST_DATA = {
  default: [
    {name:'Lead Actor',   role:'Protagonist',    init:'LA'},
    {name:'Lead Actress', role:'Female Lead',     init:'LA'},
    {name:'Director',     role:'Director',        init:'DR'},
    {name:'Co-Star',      role:'Supporting Role', init:'CS'},
    {name:'Villain',      role:'Antagonist',      init:'VI'},
    {name:'Producer',     role:'Producer',        init:'PR'},
  ]
};

window.addEventListener('DOMContentLoaded', () => {
  buildNav('movies');
  buildFooter();
  initNavScroll();

  const id  = parseInt(new URLSearchParams(window.location.search).get('id'));
  const movie = MOVIES_DB.all.find(m => m.id === id) || MOVIES_DB.all[0];

  document.title = movie.title + ' — StreamVault';

  document.getElementById('backdropImg').style.backgroundImage = `url('${movie.img}')`;
  document.getElementById('posterImg').src = movie.img;
  document.getElementById('posterImg').alt = movie.title;
  document.getElementById('movieBadge').textContent = movie.badge || '4K UHD';
  document.getElementById('movieTitle').textContent = movie.title;
  document.getElementById('movieDesc').textContent  = movie.desc;

  document.getElementById('movieMeta').innerHTML = `
    <span class="star">★</span>
    <span class="rating">${movie.rating}/10</span>
    <span class="meta-tag">${movie.lang}</span>
    <span class="meta-tag">${movie.year}</span>
    <span class="meta-tag">${movie.genre}</span>
    <span class="meta-tag">Dolby Atmos</span>
    <span class="meta-tag">4K UHD</span>`;

  document.getElementById('btnPlay').onclick = () => {
    if (!Auth.current()) { window.location.href='login.html'; return; }
    showToast('Playing ' + movie.title + '... 🎬');
  };
  document.getElementById('btnList').onclick = () => {
    if (!Auth.current()) { window.location.href='login.html'; return; }
    Watchlist.add(movie.title); showToast('"' + movie.title + '" added to My List ✓');
  };
  document.getElementById('btnDownload').onclick = () => {
    if (!Auth.current()) { window.location.href='login.html'; return; }
    showToast('Downloading ' + movie.title + '... 📥');
  };

  // Details table
  document.getElementById('detailsTable').innerHTML = `
    <tr><td>Title</td><td>${movie.title}</td></tr>
    <tr><td>Year</td><td>${movie.year}</td></tr>
    <tr><td>Language</td><td>${movie.lang}</td></tr>
    <tr><td>Genre</td><td>${movie.genre}</td></tr>
    <tr><td>Rating</td><td>★ ${movie.rating} / 10</td></tr>
    <tr><td>Quality</td><td>4K Ultra HD · Dolby Atmos</td></tr>
    <tr><td>Platform</td><td>StreamVault Original</td></tr>
    <tr><td>Duration</td><td>~2h 30min</td></tr>`;

  // Cast
  document.getElementById('castGrid').innerHTML = CAST_DATA.default.map(c => `
    <div class="cast-card">
      <div class="cast-avatar">${c.init}</div>
      <div class="cast-name">${c.name}</div>
      <div class="cast-role">${c.role}</div>
    </div>`).join('');

  // Ratings
  const r = parseFloat(movie.rating);
  document.getElementById('ratingBlock').innerHTML = `
    <div class="rating-source"><div class="score">${movie.rating}</div><div class="label">IMDb</div></div>
    <div class="rating-source"><div class="score">${Math.round(r*10)}%</div><div class="label">Rotten Tomatoes</div></div>
    <div class="rating-source"><div class="score">${(r/10*5).toFixed(1)}★</div><div class="label">StreamVault</div></div>
    <div class="rating-source"><div class="score">${Math.round(r*9+5)}%</div><div class="label">Audience Score</div></div>`;

  // Related
  const related = MOVIES_DB.all.filter(m => m.genre===movie.genre && m.id!==movie.id).slice(0,8);
  document.getElementById('relatedGrid').innerHTML = related.length
    ? related.map(makeCard).join('')
    : '<p style="color:var(--muted)">No related movies found.</p>';
});
</script>
</body>
</html>
